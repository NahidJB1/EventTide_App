<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>EventFlow • Smart Event Registration</title>
    <!-- QR Code Generator Library (lightweight, pure JS) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #F5F7FB;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Mobile-first container */
        .app-container {
            max-width: 480px;
            width: 100%;
            background: #FFFFFF;
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            position: relative;
            border-radius: 0;
            overflow-x: hidden;
        }

        /* Screen management */
        .screen {
            display: none;
            animation: fadeIn 0.25s ease;
        }

        .screen.active-screen {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px);}
            to { opacity: 1; transform: translateY(0);}
        }

        /* Typography */
        h1, h2, h3, p {
            letter-spacing: -0.01em;
        }

        /* Category chips & search */
        .search-bar {
            padding: 16px 16px 8px 16px;
        }
        .search-bar input {
            width: 100%;
            padding: 14px 18px;
            background: #F2F4F8;
            border: 1px solid #E9ECF0;
            border-radius: 44px;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .search-bar input:focus {
            outline: none;
            border-color: #0066CC;
            background: white;
            box-shadow: 0 0 0 3px rgba(0,102,204,0.1);
        }
        .chips-scroll {
            padding: 8px 16px 16px 16px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            border-bottom: 1px solid #EFEFEF;
        }
        .chip {
            background: #F0F2F5;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            color: #2C3E50;
            transition: all 0.2s;
            cursor: pointer;
        }
        .chip.active-chip {
            background: #0066CC;
            color: white;
            box-shadow: 0 4px 8px rgba(0,102,204,0.2);
        }

        /* Event Cards */
        .events-feed {
            padding: 20px 16px 32px 16px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .event-card {
            background: white;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid #EEF2F7;
        }
        .event-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 28px rgba(0,0,0,0.08);
        }
        .card-img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            background: #D9E2EC;
        }
        .card-content {
            padding: 16px 18px 20px;
        }
        .event-title {
            font-size: 1.35rem;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .event-date {
            color: #5A6E7C;
            font-size: 0.85rem;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn-details {
            background: #0066CC;
            border: none;
            color: white;
            padding: 12px 0;
            width: 100%;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            margin-top: 10px;
            transition: 0.2s;
            cursor: pointer;
        }
        .btn-details:active { background: #004c99; transform: scale(0.97);}

        /* Details Page */
        .hero-img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }
        .details-content {
            padding: 20px 20px 90px;
        }
        .event-time, .event-location {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 12px 0;
            color: #2C3E50;
            font-weight: 500;
        }
        .map-placeholder {
            background: #EFF3F8;
            height: 130px;
            border-radius: 24px;
            margin: 18px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%2389a3b3" width="48px" height="48px"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>');
            background-repeat: no-repeat;
            background-position: center;
            background-size: 40px;
            color: #4a627a;
            font-weight: 500;
            text-align: center;
        }
        /* Sticky CTA (Fitts's Law) */
        .sticky-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 480px;
            margin: 0 auto;
            background: white;
            padding: 12px 20px 22px;
            box-shadow: 0 -6px 20px rgba(0,0,0,0.08);
            border-top: 1px solid #EDF2F7;
            z-index: 10;
        }
        .btn-register-now {
            background: #0066CC;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 700;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        /* Registration Form */
        .form-container {
            padding: 24px 20px 40px;
        }
        .floating-group {
            position: relative;
            margin: 28px 0 12px;
        }
        .floating-group input, .floating-group select {
            width: 100%;
            padding: 18px 12px 8px 12px;
            font-size: 16px;
            border: 1.5px solid #DCE3EC;
            border-radius: 16px;
            background: white;
            outline: none;
            transition: 0.2s;
            font-family: inherit;
        }
        .floating-group label {
            position: absolute;
            left: 12px;
            top: 16px;
            background: white;
            padding: 0 4px;
            color: #7F8C9A;
            font-size: 16px;
            transition: 0.2s;
            pointer-events: none;
        }
        .floating-group input:focus ~ label,
        .floating-group input:not(:placeholder-shown) ~ label,
        .floating-group select:focus ~ label,
        .floating-group select:not(:placeholder-shown) ~ label {
            top: 4px;
            font-size: 11px;
            color: #0066CC;
            font-weight: 500;
        }
        .floating-group input:focus, .floating-group select:focus {
            border-color: #0066CC;
            box-shadow: 0 0 0 3px rgba(0,102,204,0.1);
        }
        .error-msg {
            color: #E5484D;
            font-size: 12px;
            margin-top: 5px;
            margin-left: 8px;
            animation: fadeSlide 0.25s ease;
        }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(-5px);}
            to { opacity: 1; transform: translateY(0);}
        }
        .btn-submit {
            background: #0066CC;
            width: 100%;
            padding: 16px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            border: none;
            color: white;
            margin-top: 32px;
            cursor: pointer;
        }
        /* Confirmation & Ticket */
        .ticket-card {
            background: linear-gradient(135deg, #FFFFFF 0%, #F9FBFE 100%);
            border-radius: 40px;
            padding: 28px 20px;
            margin: 20px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
            border: 1px solid rgba(0,102,204,0.2);
            text-align: center;
        }
        .qr-container {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }
        canvas.qr-canvas {
            background: white;
            padding: 12px;
            border-radius: 28px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            width: 160px;
            height: 160px;
        }
        .checkmark-animation {
            display: flex;
            justify-content: center;
            margin: 10px 0 20px;
        }
        .check-svg {
            width: 64px;
            height: 64px;
            background: #00A86B;
            border-radius: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pop 0.5s cubic-bezier(0.34, 1.2, 0.64, 1);
        }
        @keyframes pop {
            0% { transform: scale(0.2); opacity: 0;}
            70% { transform: scale(1.1);}
            100% { transform: scale(1); opacity: 1;}
        }
        .btn-secondary {
            background: transparent;
            border: 1.5px solid #0066CC;
            padding: 12px 20px;
            border-radius: 60px;
            font-weight: 600;
            color: #0066CC;
            margin-top: 16px;
            width: 100%;
            cursor: pointer;
        }
        .back-link {
            display: inline-block;
            margin: 16px 20px;
            color: #0066CC;
            font-weight: 500;
            text-decoration: none;
            background: #F0F4F9;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 14px;
            cursor: pointer;
            width: fit-content;
        }
        hr { margin: 12px 0; }
        .event-mini-info { font-size: 14px; color: #4a5c6c; margin-top: 8px; }
        .toast-msg {
            position: fixed;
            bottom: 80px;
            left: 20px;
            right: 20px;
            background: #1F2A3E;
            color: white;
            padding: 12px;
            border-radius: 60px;
            text-align: center;
            font-size: 14px;
            z-index: 200;
            animation: fadeUp 0.2s;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px);}
            to { opacity: 1; transform: translateY(0);}
        }
    </style>
</head>
<body>
<div class="app-container" id="appContainer">
    <!-- SCREEN 1: EVENT DISCOVERY DASHBOARD (HOME) -->
    <div id="homeScreen" class="screen active-screen">
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="🔍 Search events...">
        </div>
        <div class="chips-scroll" id="categoryChips">
            <div class="chip active-chip" data-cat="all">All</div>
            <div class="chip" data-cat="Tech">Tech</div>
            <div class="chip" data-cat="Workshops">Workshops</div>
            <div class="chip" data-cat="Campus">Campus</div>
        </div>
        <div id="eventsFeed" class="events-feed">
            <!-- dynamic events cards injected -->
        </div>
    </div>

    <!-- SCREEN 2: EVENT DETAILS PAGE -->
    <div id="detailsScreen" class="screen">
        <div style="position: relative;">
            <img id="detailHero" class="hero-img" alt="event hero">
            <div class="back-link" id="backHomeFromDetails">← Back to events</div>
        </div>
        <div class="details-content">
            <h1 id="detailTitle" style="font-size: 1.8rem;">Event Title</h1>
            <div class="event-time">📅 <span id="detailDate"></span></div>
            <div class="event-location">📍 <span id="detailLocation"></span></div>
            <div class="map-placeholder" id="mapPlaceholder">🗺️ Campus Hall, Main Quad</div>
            <p id="detailDesc" style="line-height: 1.4; margin: 16px 0 24px; color:#2c3e50;"></p>
        </div>
        <div class="sticky-footer">
            <button id="registerNowBtn" class="btn-register-now">Register Now →</button>
        </div>
    </div>

    <!-- SCREEN 3: REGISTRATION FORM (Checkout) -->
    <div id="registrationScreen" class="screen">
        <div class="back-link" id="backToDetailsFromReg">← Back to event</div>
        <div class="form-container">
            <h2 style="margin-bottom: 8px;">🎟️ Secure your spot</h2>
            <p id="regEventName" style="color:#0066CC; font-weight:500; margin-bottom: 20px;"></p>
            <div class="floating-group">
                <input type="text" id="fullName" placeholder=" " autocomplete="name">
                <label>Full name</label>
                <div id="nameError" class="error-msg"></div>
            </div>
            <div class="floating-group">
                <input type="email" id="emailAddr" placeholder=" " autocomplete="email">
                <label>Email address</label>
                <div id="emailError" class="error-msg"></div>
            </div>
            <div class="floating-group">
                <select id="ticketQty" style="appearance: none; background: white;">
                    <option value="1">1 Ticket</option>
                    <option value="2">2 Tickets</option>
                    <option value="3">3 Tickets</option>
                    <option value="4">4 Tickets</option>
                </select>
                <label>Ticket quantity</label>
                <div id="qtyError" class="error-msg"></div>
            </div>
            <button id="submitRegistration" class="btn-submit">Confirm registration</button>
        </div>
    </div>

    <!-- SCREEN 4: CONFIRMATION & DIGITAL TICKET -->
    <div id="confirmationScreen" class="screen">
        <div class="back-link" id="backHomeFromConfirm">🏠 Back to events</div>
        <div class="ticket-card">
            <div class="checkmark-animation" id="checkmarkAnim">
                <div class="check-svg">✓</div>
            </div>
            <h2 style="font-size: 1.8rem;">You're in!</h2>
            <p style="margin: 6px 0;">Your digital ticket is ready</p>
            <div class="qr-container" id="qrCodeContainer"></div>
            <div style="margin: 12px 0;">
                <strong id="confirmEventTitle"></strong><br>
                <span id="confirmAttendee"></span>
            </div>
            <button id="addToCalendarBtn" class="btn-secondary">📅 Add to Calendar</button>
            <button id="downloadTicketMock" class="btn-secondary" style="margin-top: 12px; background:#F2F4F8;">✨ Save ticket</button>
        </div>
        <p style="text-align: center; font-size: 13px; color: gray; margin: 16px;">Show QR at venue entrance</p>
    </div>
</div>

<script>
    // ----------------------------- MOCK EVENT DATA -------------------------
    const eventsData = [
        { id: 1, title: "AI Future Summit 2025", date: "Sat, Apr 12 • 10:00 AM", location: "Innovation Hub, Room 101", category: "Tech", desc: "Explore cutting-edge AI breakthroughs, hands-on workshops and keynote speakers from leading AI labs. Lunch included.", image: "https://picsum.photos/id/0/400/220", thumb: "https://picsum.photos/id/0/300/160" },
        { id: 2, title: "Creative UX Workshop", date: "Wed, Apr 16 • 2:00 PM", location: "Design Studio B", category: "Workshops", desc: "Learn user-centered design, prototyping, and get feedback from experts. Perfect for designers and product managers.", image: "https://picsum.photos/id/20/400/220", thumb: "https://picsum.photos/id/20/300/160" },
        { id: 3, title: "Spring Campus Fest", date: "Sat, Apr 26 • 12:00 PM", location: "Main Campus Lawn", category: "Campus", desc: "Live music, food trucks, networking fair. Celebrate spring with the entire student community!", image: "https://picsum.photos/id/26/400/220", thumb: "https://picsum.photos/id/26/300/160" },
        { id: 4, title: "Generative AI Hackathon", date: "Sun, May 4 • 09:00 AM", location: "Tech Center, Floor 3", category: "Tech", desc: "Build next-gen AI apps, win prizes, meet mentors. Bring your laptop and creativity.", image: "https://picsum.photos/id/77/400/220", thumb: "https://picsum.photos/id/77/300/160" },
        { id: 5, title: "Mindfulness & Productivity", date: "Fri, May 9 • 11:30 AM", location: "Wellness Hub", category: "Workshops", desc: "Improve focus, reduce stress with practical techniques. Certificate provided.", image: "https://picsum.photos/id/125/400/220", thumb: "https://picsum.photos/id/125/300/160" }
    ];

    // Global state
    let currentEvent = null;
    let currentRegistration = { name: "", email: "", ticketQty: 1 };
    let activeCategory = "all";
    let searchQuery = "";

    // DOM elements
    const homeScreen = document.getElementById('homeScreen');
    const detailsScreen = document.getElementById('detailsScreen');
    const regScreen = document.getElementById('registrationScreen');
    const confirmScreen = document.getElementById('confirmationScreen');

    function showScreen(screenId) {
        homeScreen.classList.remove('active-screen');
        detailsScreen.classList.remove('active-screen');
        regScreen.classList.remove('active-screen');
        confirmScreen.classList.remove('active-screen');
        document.getElementById(screenId).classList.add('active-screen');
        window.scrollTo(0, 0);
    }

    // Render Home Feed with filters
    function renderHomeFeed() {
        let filtered = eventsData.filter(ev => {
            const matchCategory = activeCategory === "all" || ev.category === activeCategory;
            const matchSearch = ev.title.toLowerCase().includes(searchQuery.toLowerCase());
            return matchCategory && matchSearch;
        });
        const feedContainer = document.getElementById('eventsFeed');
        if (filtered.length === 0) {
            feedContainer.innerHTML = `<div style="text-align:center; padding: 40px;">✨ No events match<br><span style="font-size:14px;">Try another category</span></div>`;
            return;
        }
        feedContainer.innerHTML = filtered.map(ev => `
            <div class="event-card" data-event-id="${ev.id}">
                <img class="card-img" src="${ev.thumb}" alt="${ev.title}" loading="lazy">
                <div class="card-content">
                    <div class="event-title">${ev.title}</div>
                    <div class="event-date">📅 ${ev.date}</div>
                    <button class="btn-details" data-id="${ev.id}">View Details →</button>
                </div>
            </div>
        `).join('');
        // attach event listeners to each button
        document.querySelectorAll('.btn-details').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const evId = parseInt(btn.getAttribute('data-id'));
                const eventObj = eventsData.find(e => e.id === evId);
                if (eventObj) {
                    currentEvent = eventObj;
                    populateDetailsScreen(eventObj);
                    showScreen('detailsScreen');
                }
            });
        });
    }

    function populateDetailsScreen(event) {
        document.getElementById('detailHero').src = event.image;
        document.getElementById('detailTitle').innerText = event.title;
        document.getElementById('detailDate').innerText = event.date;
        document.getElementById('detailLocation').innerText = event.location;
        document.getElementById('detailDesc').innerText = event.desc;
        const mapDiv = document.getElementById('mapPlaceholder');
        mapDiv.innerHTML = `📍 ${event.location} • 🗺️ Interactive map available`;
        mapDiv.style.background = "#EFF3F8";
        mapDiv.style.backgroundImage = "none";
        mapDiv.style.display = "flex";
    }

    // registration screen prefill: show event name
    function prepareRegistrationScreen() {
        if (currentEvent) {
            document.getElementById('regEventName').innerHTML = `🎫 Registering for: <strong>${currentEvent.title}</strong>`;
        } else {
            document.getElementById('regEventName').innerHTML = `🎫 Event details`;
        }
        // clear old errors & fields
        document.getElementById('fullName').value = "";
        document.getElementById('emailAddr').value = "";
        document.getElementById('ticketQty').value = "1";
        document.getElementById('nameError').innerText = "";
        document.getElementById('emailError').innerText = "";
        document.getElementById('qtyError').innerText = "";
    }

    // inline validation
    function validateRegistrationForm() {
        let isValid = true;
        const name = document.getElementById('fullName').value.trim();
        const email = document.getElementById('emailAddr').value.trim();
        const qty = parseInt(document.getElementById('ticketQty').value);
        document.getElementById('nameError').innerText = "";
        document.getElementById('emailError').innerText = "";
        document.getElementById('qtyError').innerText = "";

        if (name === "") {
            document.getElementById('nameError').innerText = "Full name is required";
            isValid = false;
        } else if (name.length < 2) {
            document.getElementById('nameError').innerText = "Name too short";
            isValid = false;
        }
        const emailPattern = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
        if (email === "") {
            document.getElementById('emailError').innerText = "Email address required";
            isValid = false;
        } else if (!emailPattern.test(email)) {
            document.getElementById('emailError').innerText = "Enter a valid email (e.g., name@domain.com)";
            isValid = false;
        }
        if (isNaN(qty) || qty < 1) {
            document.getElementById('qtyError').innerText = "Select at least 1 ticket";
            isValid = false;
        }
        return isValid;
    }

    // Generate QR code based on registration and event
    function generateTicketQR(name, email, eventTitle, ticketCount) {
        const qrContainer = document.getElementById('qrCodeContainer');
        qrContainer.innerHTML = ""; // clear previous
        const uniqueId = Math.random().toString(36).substring(2, 10).toUpperCase();
        const qrData = `EVENT:${eventTitle}\nATTENDEE:${name}\nEMAIL:${email}\nTICKETS:${ticketCount}\nID:${uniqueId}`;
        // Use qrcode-generator
        const qr = qrcode(0, 'M');
        qr.addData(qrData);
        qr.make();
        const cellSize = 4;
        const margin = 2;
        const size = qr.getModuleCount() * cellSize + margin * 2;
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        canvas.classList.add('qr-canvas');
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, size, size);
        for (let row = 0; row < qr.getModuleCount(); row++) {
            for (let col = 0; col < qr.getModuleCount(); col++) {
                if (qr.isDark(row, col)) {
                    ctx.fillStyle = '#000000';
                    ctx.fillRect(col * cellSize + margin, row * cellSize + margin, cellSize, cellSize);
                }
            }
        }
        qrContainer.appendChild(canvas);
        return uniqueId;
    }

    // show confirmation with animation & ticket
    function showConfirmationTicket(name, email, qty) {
        const eventTitle = currentEvent ? currentEvent.title : "Event";
        const eventDate = currentEvent ? currentEvent.date : "TBD";
        document.getElementById('confirmEventTitle').innerHTML = `${eventTitle} • ${eventDate}`;
        document.getElementById('confirmAttendee').innerHTML = `🎟️ ${name} · ${qty} ticket(s)`;
        // animated checkmark re-trigger: clone and replace to re-run animation
        const animDiv = document.getElementById('checkmarkAnim');
        const newDiv = document.createElement('div');
        newDiv.className = 'checkmark-animation';
        newDiv.innerHTML = `<div class="check-svg">✓</div>`;
        animDiv.parentNode.replaceChild(newDiv, animDiv);
        newDiv.id = 'checkmarkAnim';
        // generate QR code
        generateTicketQR(name, email, eventTitle, qty);
        showScreen('confirmationScreen');
    }

    // Add to calendar dummy with toast message
    function showToastMessage(msg) {
        const existingToast = document.querySelector('.toast-msg');
        if(existingToast) existingToast.remove();
        const toast = document.createElement('div');
        toast.className = 'toast-msg';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    // Event Listeners wiring
    function bindGlobalEvents() {
        // Category chips
        document.querySelectorAll('.chip').forEach(chip => {
            chip.addEventListener('click', (e) => {
                document.querySelectorAll('.chip').forEach(c => c.classList.remove('active-chip'));
                chip.classList.add('active-chip');
                activeCategory = chip.getAttribute('data-cat');
                renderHomeFeed();
            });
        });
        // Search input
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderHomeFeed();
        });
        // Back buttons
        document.getElementById('backHomeFromDetails').addEventListener('click', () => { renderHomeFeed(); showScreen('homeScreen'); });
        document.getElementById('backToDetailsFromReg').addEventListener('click', () => { if(currentEvent) populateDetailsScreen(currentEvent); showScreen('detailsScreen'); });
        document.getElementById('backHomeFromConfirm').addEventListener('click', () => { renderHomeFeed(); showScreen('homeScreen'); });
        // Register Now from details
        document.getElementById('registerNowBtn').addEventListener('click', () => {
            if (currentEvent) {
                prepareRegistrationScreen();
                showScreen('registrationScreen');
            } else { showScreen('homeScreen'); }
        });
        // Submit registration with inline validation (zero alert)
        document.getElementById('submitRegistration').addEventListener('click', (e) => {
            e.preventDefault();
            if (!validateRegistrationForm()) return;
            const name = document.getElementById('fullName').value.trim();
            const email = document.getElementById('emailAddr').value.trim();
            const qty = parseInt(document.getElementById('ticketQty').value);
            currentRegistration = { name, email, ticketQty: qty };
            showConfirmationTicket(name, email, qty);
        });
        // Add to calendar button
        document.getElementById('addToCalendarBtn').addEventListener('click', () => {
            if(currentEvent) {
                showToastMessage(`📅 "${currentEvent.title}" added to your calendar (demo)`);
            } else { showToastMessage(`Event added to calendar`); }
        });
        // Save ticket mock (just visual feedback)
        document.getElementById('downloadTicketMock').addEventListener('click', () => {
            showToastMessage(`✨ Ticket saved as image (simulated)`);
        });
    }

    // initial load: render events, set default
    function init() {
        renderHomeFeed();
        bindGlobalEvents();
        // dummy fallback for map
    }
    init();
</script>
</body>
</html>
